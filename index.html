<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#0e1b2a"/>
<title>Control Confección</title>

<link rel="manifest" href="manifest.webmanifest"/>

<style>
:root{
  --ink:#0e1b2a;
  --green:#7fe28f;
  --green-soft:#f4fdf6;
  --red:#e69095;
  --stroke:#0e1b2a;
  --radius:16px;
  --shadow:0 8px 20px rgba(0,0,0,.15);
}
*{box-sizing:border-box;font-family:system-ui;}
body{margin:0;background:#fff;display:flex;justify-content:center;padding:24px;color:var(--ink);}
.app{width:min(420px,100%);}
h1{margin:0 0 20px 0;}

.field{margin-bottom:18px;display:flex;flex-direction:column;gap:6px;}
label{font-size:12px;font-weight:700;}
input,select{padding:14px;border-radius:10px;border:1px solid #ccc;font-size:16px;}

.btn{width:100%;padding:16px;border-radius:14px;border:2px solid var(--stroke);font-weight:800;background:var(--green);cursor:pointer;}
#reader{width:100%;margin-top:10px;border-radius:10px;display:none;}
</style>
</head>

<body>
<div class="app">

<h1>CONTROL CONFECCIÓN</h1>

<div class="field">
<label>TIPO DE CONFECCIÓN</label>
<select id="tipoConfeccion">
<option value="8">8 kg</option>
<option value="10">10 kg</option>
<option value="12">12 kg</option>
<option value="14">14 kg</option>
<option value="16">16 kg</option>
<option value="20">20 kg</option>
</select>
</div>

<div class="field">
<label>CALIDAD</label>
<select id="calidad">
<option value="EXTRA">Extra</option>
<option value="PRIMERA">Primera</option>
<option value="SEGUNDA">Segunda</option>
</select>
</div>

<div class="field">
<label>CÓDIGO QR</label>
<input id="codigoQr" placeholder="Escanear QR"/>
</div>

<button id="btnScan" class="btn">Abrir cámara</button>

<div id="reader"></div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyeAlya_wQ54nN7lxy2nqL70yxnOWUf2yD34Ld2pdljCjVAOgChmGO54rLAIsHcUmOeRA/exec";

/* =========================
   PERSISTENCIA
========================= */
const SETTINGS_KEY="conf_settings";

function saveSettings(){
  localStorage.setItem(SETTINGS_KEY,JSON.stringify({
    tipo:tipo.value,
    calidad:calidad.value
  }));
}

function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}");
    if(s.tipo) tipo.value=s.tipo;
    if(s.calidad) calidad.value=s.calidad;
  }catch{}
}

/* =========================
   COLA OFFLINE
========================= */
const QKEY="queue";

function loadQ(){return JSON.parse(localStorage.getItem(QKEY)||"[]");}
function saveQ(q){localStorage.setItem(QKEY,JSON.stringify(q));}

function enqueue(i){
  const q=loadQ();
  q.push(i);
  saveQ(q);
}

function dequeue(){
  const q=loadQ();
  const i=q.shift();
  saveQ(q);
  return i;
}

async function sendOne(i){
  const url=new URL(API_URL);
  Object.keys(i).forEach(k=>url.searchParams.set(k,i[k]));
  const r=await fetch(url);
  const d=await r.json();
  if(!d.ok) throw "error";
}

async function flush(){
  const q=loadQ();
  if(!q.length) return;
  try{
    await sendOne(q[0]);
    dequeue();
  }catch{}
}

setInterval(flush,3000);
window.addEventListener("online",flush);

/* =========================
   CONTROL QR
========================= */
let lastCodigo="";
let lastScan="";
let lastScanTime=0;

function canScan(text){
  const now=Date.now();
  if(text===lastScan && now-lastScanTime<1500) return false;
  lastScan=text;
  lastScanTime=now;
  return true;
}

async function processQR(text){
  if(!text) return;

  // DUPLICADO
  if(text===lastCodigo){
    if(!confirm("⚠️ MISMO CÓDIGO LEÍDO\n¿Continuar?")){
      return;
    }
  }

  const item={
    tipo_confeccion:tipo.value,
    calidad:calidad.value,
    codigo_qr:text,
    ts_client:new Date().toISOString(),
    id:Date.now().toString()
  };

  enqueue(item);
  lastCodigo=text;

  alert("LECTURA CORRECTA");

  flush();
}

/* =========================
   SCANNER
========================= */
let qr;

async function startScan(){
  qr=new Html5Qrcode("reader");
  document.getElementById("reader").style.display="block";

  const cams=await Html5Qrcode.getCameras();
  const id=cams[0].id;

  await qr.start(id,{fps:10,qrbox:250},
    txt=>{
      if(!canScan(txt)) return;
      processQR(txt);
    });
}

document.getElementById("btnScan").onclick=startScan;

/* =========================
   INIT
========================= */
const tipo=document.getElementById("tipoConfeccion");
const calidad=document.getElementById("calidad");

tipo.onchange=saveSettings;
calidad.onchange=saveSettings;

loadSettings();

/* =========================
   SERVICE WORKER
========================= */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
